<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Experience UI</title>

<style>
  :root {
    --primary: #3b82f6;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --bg-color: #0f172a; /* Fallback dark base */
    --card-bg: #ffffff;
  }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background-color: var(--bg-color);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* FULLSCREEN AMBIENT SKY BACKGROUND */
  .ambient-sky-bg {
    position: fixed;
    inset: -10%; /* Oversized to hide blur edges */
    z-index: -1;
    pointer-events: none;
    filter: blur(60px); /* Soft glowing effect */
    opacity: 0.8; /* Slightly dimmed to make the card pop */
  }

  .bg-layer {
    position: absolute;
    inset: 0;
    transition: opacity 0.5s linear;
  }

  /* CARD */
  .card {
    width: 420px;
    max-width: 90vw;
    border-radius: 32px;
    background: var(--card-bg);
    box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.4), 0 12px 24px -8px rgba(0, 0, 0, 0.2);
    overflow: hidden;
    position: relative;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    z-index: 1;
  }
  
  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 32px 64px -12px rgba(0, 0, 0, 0.5), 0 16px 32px -8px rgba(0, 0, 0, 0.3);
  }

  /* SKY CONTAINER */
  .sky-container {
    height: 280px;
    position: relative;
    overflow: hidden;
    border-radius: 32px 32px 0 0;
  }

  /* SKY LAYERS (For smooth color blending - reused for background) */
  .sky-layer {
    position: absolute;
    inset: 0;
    transition: opacity 0.5s linear;
  }
  .sky-night { background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); }
  .sky-sunrise { background: linear-gradient(180deg, #6366f1 0%, #f43f5e 50%, #fb923c 100%); }
  .sky-day { background: linear-gradient(180deg, #38bdf8 0%, #bae6fd 100%); }
  .sky-sunset { background: linear-gradient(180deg, #4f46e5 0%, #c026d3 40%, #f59e0b 100%); }

  /* CELESTIAL BODIES */
  .celestial-body {
    position: absolute;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    /* Will be positioned by JS */
  }

  .sun {
    background: #fef08a;
    box-shadow: 0 0 40px #facc15, 0 0 80px #fef08a, inset 0 0 10px #ca8a04;
    animation: pulse 4s infinite alternate;
  }

  @keyframes pulse {
    0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 30px #facc15, 0 0 60px #fef08a; }
    100% { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 50px #facc15, 0 0 90px #fef08a; }
  }

  .moon {
    background: transparent;
    box-shadow: inset -12px 2px 0 2px #e2e8f0;
    filter: drop-shadow(0 0 15px rgba(255,255,255,0.6));
  }

  /* STARS */
  .stars {
    position: absolute;
    inset: 0;
    transition: opacity 0.5s linear;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--duration) infinite ease-in-out alternate;
    opacity: 0.2;
  }

  @keyframes twinkle {
    to { opacity: 1; transform: scale(1.5); box-shadow: 0 0 4px white; }
  }

  /* CLOUDS */
  .clouds-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    transition: opacity 0.5s linear;
  }

  .cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.9;
    animation: drift linear infinite;
  }

  /* Constructing fluffy clouds using box-shadow */
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }

  .cloud-1 { width: 100px; height: 30px; top: 180px; left: -120px; animation-duration: 45s; }
  .cloud-1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
  .cloud-1::after { width: 40px; height: 40px; top: -15px; left: 50px; }

  .cloud-2 { width: 80px; height: 24px; top: 140px; left: -100px; animation-duration: 35s; animation-delay: -15s; opacity: 0.7; transform: scale(0.8); }
  .cloud-2::before { width: 40px; height: 40px; top: -20px; left: 10px; }
  .cloud-2::after { width: 30px; height: 30px; top: -10px; left: 40px; }

  @keyframes drift {
    from { transform: translateX(0vw); }
    to { transform: translateX(500px); }
  }

  /* CONTENT AREA */
  .content {
    padding: 32px;
    text-align: center;
  }

  .time-display {
    font-size: 48px;
    font-weight: 700;
    color: var(--text-main);
    letter-spacing: -1px;
    margin: 0;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .greeting-container {
    height: 24px;
    margin-top: 8px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .greeting {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-muted);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
    opacity: 1;
    transform: translateY(0);
  }
  
  .greeting.animating {
    opacity: 0;
    transform: translateY(-10px);
  }

  /* CUSTOM TIMELINE SLIDER */
  .slider-wrapper {
    position: relative;
    height: 24px;
    display: flex;
    align-items: center;
    margin-bottom: 28px;
  }

  .slider-track {
    position: absolute;
    width: 100%;
    height: 8px;
    background: #e2e8f0;
    border-radius: 4px;
    overflow: hidden;
  }

  .slider-fill {
    position: absolute;
    height: 100%;
    background: var(--primary);
    width: 0%;
    border-radius: 4px;
    pointer-events: none;
  }

  .slider-thumb {
    position: absolute;
    width: 20px;
    height: 20px;
    background: white;
    border: 2px solid var(--primary);
    border-radius: 50%;
    left: 0%;
    transform: translateX(-50%);
    box-shadow: 0 2px 6px rgba(59, 130, 246, 0.4);
    pointer-events: none;
    transition: transform 0.2s ease;
  }

  .slider-wrapper:active .slider-thumb {
    transform: translateX(-50%) scale(1.2);
  }

  input[type=range] {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    margin: 0;
    z-index: 10;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .btn {
    flex: 1;
    padding: 12px 0;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    background: #f1f5f9;
    color: var(--text-muted);
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn:hover {
    background: #e2e8f0;
    color: var(--text-main);
  }

  .btn:active {
    transform: scale(0.96);
  }

  .btn.active {
    background: var(--primary);
    color: white;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: currentColor;
    border-radius: 50%;
    opacity: 0.5;
  }

  .btn.active .status-dot {
    opacity: 1;
    animation: pulse-dot 1.5s infinite;
  }

  @keyframes pulse-dot {
    0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
    70% { box-shadow: 0 0 0 6px rgba(255,255,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
  }

</style>
</head>
<body>

<!-- Synced Fullscreen Ambient Sky Background -->
<div class="ambient-sky-bg">
  <div class="bg-layer sky-night" id="bgLayer-night"></div>
  <div class="bg-layer sky-sunrise" id="bgLayer-sunrise"></div>
  <div class="bg-layer sky-day" id="bgLayer-day"></div>
  <div class="bg-layer sky-sunset" id="bgLayer-sunset"></div>
</div>

<div class="card">
  <div class="sky-container">
    <!-- Background Gradient Layers (Inside Card) -->
    <div class="sky-layer sky-night" id="layer-night"></div>
    <div class="sky-layer sky-sunrise" id="layer-sunrise"></div>
    <div class="sky-layer sky-day" id="layer-day"></div>
    <div class="sky-layer sky-sunset" id="layer-sunset"></div>

    <div class="stars" id="stars"></div>

    <div class="clouds-layer" id="clouds">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
    </div>

    <!-- Celestial Bodies -->
    <div class="celestial-body sun" id="sun"></div>
    <div class="celestial-body moon" id="moon"></div>
  </div>

  <div class="content">
    <div class="time-display" id="timeDisplay">08:00</div>
    
    <div class="greeting-container">
      <div class="greeting" id="greeting">Good Morning</div>
    </div>

    <div class="slider-wrapper">
      <div class="slider-track">
        <div class="slider-fill" id="sliderFill"></div>
      </div>
      <div class="slider-thumb" id="sliderThumb"></div>
      <input type="range" min="0" max="23.99" step="0.01" value="8" id="timeSlider">
    </div>

    <div class="controls">
      <button class="btn" id="btnLive">
        <div class="status-dot"></div> Live Time
      </button>
    </div>
  </div>
</div>

<script>
  // DOM Elements
  const slider = document.getElementById('timeSlider');
  const sliderFill = document.getElementById('sliderFill');
  const sliderThumb = document.getElementById('sliderThumb');
  
  // Card Sky Layers
  const layerNight = document.getElementById('layer-night');
  const layerSunrise = document.getElementById('layer-sunrise');
  const layerDay = document.getElementById('layer-day');
  const layerSunset = document.getElementById('layer-sunset');
  
  // Ambient Background Layers
  const bgLayerNight = document.getElementById('bgLayer-night');
  const bgLayerSunrise = document.getElementById('bgLayer-sunrise');
  const bgLayerDay = document.getElementById('bgLayer-day');
  const bgLayerSunset = document.getElementById('bgLayer-sunset');
  
  const clouds = document.getElementById('clouds');
  const starsContainer = document.getElementById('stars');
  
  const sun = document.getElementById('sun');
  const moon = document.getElementById('moon');
  
  const timeDisplay = document.getElementById('timeDisplay');
  const greetingEl = document.getElementById('greeting');
  
  const btnLive = document.getElementById('btnLive');

  // State
  let currentHour = 8;
  let currentGreeting = "";
  let mode = 'manual'; // 'manual', 'live'
  let animationFrameId = null;

  // Initialize Stars
  function initStars() {
    for (let i = 0; i < 60; i++) {
      let star = document.createElement('div');
      star.className = 'star';
      star.style.left = `${Math.random() * 100}%`;
      star.style.top = `${Math.random() * 100}%`;
      let size = Math.random() * 2 + 1;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;
      star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
      starsContainer.appendChild(star);
    }
  }
  initStars();

  // Core Update Function
  function updateUI(hour) {
    // 1. Format Time Text (HH:MM)
    let h = Math.floor(hour);
    let m = Math.floor((hour % 1) * 60);
    timeDisplay.textContent = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;

    // 2. Update Slider Visuals
    let percent = (hour / 23.99) * 100;
    sliderFill.style.width = `${percent}%`;
    sliderThumb.style.left = `${percent}%`;

    // 3. Calculate Sky Gradients Opacity
    let n = 0, sr = 0, d = 0, ss = 0;
    if (hour >= 20 || hour < 4) { n = 1; }
    else if (hour >= 4 && hour < 6) { sr = (hour - 4) / 2; n = 1 - sr; }
    else if (hour >= 6 && hour < 8) { d = (hour - 6) / 2; sr = 1 - d; }
    else if (hour >= 8 && hour < 16) { d = 1; }
    else if (hour >= 16 && hour < 18) { ss = (hour - 16) / 2; d = 1 - ss; }
    else if (hour >= 18 && hour < 20) { n = (hour - 18) / 2; ss = 1 - n; }

    // Apply to Card Sky
    layerNight.style.opacity = n;
    layerSunrise.style.opacity = sr;
    layerDay.style.opacity = d;
    layerSunset.style.opacity = ss;
    
    // Apply to Fullscreen Ambient Background
    bgLayerNight.style.opacity = n;
    bgLayerSunrise.style.opacity = sr;
    bgLayerDay.style.opacity = d;
    bgLayerSunset.style.opacity = ss;
    
    // Stars fade in at night
    starsContainer.style.opacity = Math.max(n, 0.2) > 0.5 ? n : 0;
    
    // Clouds look darker at night
    clouds.style.opacity = Math.max(1 - (n * 0.7), 0.3);

    // 4. Calculate Celestial Orbits (Arched paths)
    // The sky height is 280px. Horizon is around 280px.
    const horizonY = 320; 
    const peakY = 60; 
    const amplitude = horizonY - peakY;

    // Sun path: Rises at 5, sets at 19. (14 hours duration)
    let pSun = (hour - 5) / 14;
    sun.style.left = `${pSun * 100}%`;
    sun.style.top = `${horizonY - Math.sin(pSun * Math.PI) * amplitude}px`;

    // Moon path: Rises at 17, sets at 7. (14 hours duration)
    let hMoon = hour < 12 ? hour + 24 : hour; 
    let pMoon = (hMoon - 17) / 14;
    moon.style.left = `${pMoon * 100}%`;
    moon.style.top = `${horizonY - Math.sin(pMoon * Math.PI) * amplitude}px`;

    // 5. Update Greeting Text with Animation
    let newGreeting = "";
    if (hour >= 5 && hour < 12) newGreeting = "Good Morning ☀️";
    else if (hour >= 12 && hour < 17) newGreeting = "Good Afternoon 🌤️";
    else if (hour >= 17 && hour < 21) newGreeting = "Good Evening 🌇";
    else newGreeting = "Good Night 🌙";

    if (newGreeting !== currentGreeting) {
      greetingEl.classList.add('animating');
      setTimeout(() => {
        greetingEl.textContent = newGreeting;
        greetingEl.classList.remove('animating');
      }, 200); // Matches CSS transition duration
      currentGreeting = newGreeting;
    }
  }

  // --- Interaction & Modes ---

  function setMode(newMode) {
    mode = newMode;
    cancelAnimationFrame(animationFrameId);
    
    btnLive.classList.toggle('active', mode === 'live');

    if (mode === 'live') runLiveLoop();
  }

  // Manual Slider Drag
  slider.addEventListener('input', (e) => {
    setMode('manual'); // Breaks out of auto modes
    currentHour = parseFloat(e.target.value);
    updateUI(currentHour);
  });

  // Live Real-World Time Mode
  function runLiveLoop() {
    let now = new Date();
    currentHour = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
    slider.value = currentHour;
    updateUI(currentHour);
    
    // Check again next frame, but realistically it updates smoothly based on seconds
    animationFrameId = requestAnimationFrame(runLiveLoop);
  }

  // Button Listeners
  btnLive.addEventListener('click', () => {
    if (mode === 'live') setMode('manual');
    else setMode('live');
  });

  // Initial Boot
  updateUI(currentHour);
  
</script>

</body>
</html>
